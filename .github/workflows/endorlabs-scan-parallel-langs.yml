name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      java: ${{ steps.filter.outputs.java }}
      c-net: ${{ steps.filter.outputs.c-net }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |-
            java:
              - '**/pom.xml'
              - '**/build.gradle'
              - '**/build.gradle.kts'
              - '**/*.java'
            c-net:
              - '**/*.csproj'
              - '**/packages.lock.json'
              - '**/Directory.Build.props'
              - '**/Directory.Packages.props'
              - '**/*.props'
              - '**/*.targets'
              - '**/*.cs'
  scan-java-pr:
    name: "PR Scan: java"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=java --exclude-path=generator/ProtocolTestsGenerator/smithy-dotnet-codegen-test/** --exclude-path=generator/ProtocolTestsGenerator/smithy-dotnet-protocol-test/** --quick-scan"
  scan-java-monitor:
    name: "Monitor Scan: java"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=java --exclude-path=generator/ProtocolTestsGenerator/smithy-dotnet-codegen-test/** --exclude-path=generator/ProtocolTestsGenerator/smithy-dotnet-protocol-test/**"
          sarif_file: findings.sarif
          scan_github_actions: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-java
    env:
      # Auto-fallback safety net — if the local build fails on a runner, endorctl uses the platform's pre-computed reachability instead of failing the job. Full deep reachability is still the primary path on success.
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
  scan-c-net-pr:
    name: "PR Scan: c#/.net"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.c-net == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=c# --exclude-path=extensions/test/** --exclude-path=sdk/test/** --quick-scan"
  scan-c-net-monitor:
    name: "Monitor Scan: c#/.net"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=c# --exclude-path=extensions/test/** --exclude-path=sdk/test/**"
          sarif_file: findings.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-c-net
    env:
      # Auto-fallback safety net — if the local build fails on a runner, endorctl uses the platform's pre-computed reachability instead of failing the job. Full deep reachability is still the primary path on success.
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"